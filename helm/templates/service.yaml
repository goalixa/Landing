apiVersion: v1
kind: Service
metadata:
  name: landing
  namespace: {{ .Values.namespace.name }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "goalixa-landing.selectorLabels" . | nindent 4 }}
